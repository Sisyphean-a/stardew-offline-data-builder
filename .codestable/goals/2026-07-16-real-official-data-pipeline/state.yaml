schema_version: 1
goal: "real-official-data-pipeline"
status: complete
objective: "以真实《星露谷物语》官方解包数据为主数据源，完成可从用户游戏目录构建 SQLite、.svdata、报告和图片产物的正式流程。"
start_point: "现有流程能解析测试夹具和通用 JSON，但没有针对真实官方结构的稳定识别、完整类型覆盖和真实路径验收。"
acceptance:
  - "真实官方结构的物品、作物、鱼类、村民及文档列出的扩展类型可被识别、标准化并写入非空 SQLite。"
  - "官方数据优先于社区数据，人工修正优先于官方和社区数据，社区数据仅补充与校验。"
  - "build 可从用户游戏目录或指定解包目录生成数据库、报告、图片与 .svdata，且报告暴露缺失和未匹配。"
  - "新增真实结构契约测试、端到端构建测试、pytest 与 ruff 检查通过。"
non_goals:
  - "不新增 GUI、Web 服务或 Android 工程。"
  - "不联网下载游戏、社区数据或第三方解包工具。"
